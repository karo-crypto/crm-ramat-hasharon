<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM מנהלת העסקים - רמת השרון 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(4px); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; color: #475569; margin-bottom: 0.3rem; text-align: right; }
        .input-group input, .input-group select, .input-group textarea { 
            width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.75rem; outline: none; transition: all 0.2s; background: #fff; text-align: right;
        }
        .input-group input:focus { border-color: #2563eb; ring: 3px; ring-color: #dbeafe; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb !important; opacity: 1 !important; }
        .sticky-col { position: sticky; right: 0; background: white; z-index: 10; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        tr:hover .sticky-col { background: #f8fafc; }
        th.sticky-col { background: #f8fafc; z-index: 20; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 1rem 2rem; border-radius: 3rem; display: none; z-index: 200; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="toast" class="toast font-bold text-center">פעולה בוצעה בהצלחה!</div>

<div class="min-h-screen text-right">
    <header class="bg-white border-b border-slate-200 px-4 py-6 md:px-8">
        <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg"><i data-lucide="layout-dashboard" class="w-8 h-8"></i></div>
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">מנהלת העסקים רמת השרון</h1>
                    <p class="text-slate-500 font-medium">גרסת PoC סופית 2026 | ניהול קהילה וחדשנות</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="copyFullCode()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-700 transition-all shadow-md"><i data-lucide="copy" class="w-4 h-4"></i> העתקת קוד מקור</button>
                <button onclick="exportToCSV()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-700 transition-all shadow-md"><i data-lucide="download" class="w-4 h-4"></i> ייצוא CSV</button>
                <button onclick="openNewBusiness()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-lg"><i data-lucide="plus-circle" class="w-5 h-5"></i> הוספת עסק</button>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <nav class="max-w-[1600px] mx-auto flex gap-8 px-8">
            <button id="tab-directory" onclick="toggleTab('directory')" class="py-4 font-bold flex items-center gap-2 tab-active transition-all"><i data-lucide="users" class="w-5 h-5"></i> מאגר עסקים</button>
            <button id="tab-settings" onclick="toggleTab('settings')" class="py-4 font-bold flex items-center gap-2 text-slate-400 hover:text-slate-600 transition-all"><i data-lucide="settings" class="w-5 h-5"></i> הגדרות ופרמטרים</button>
        </nav>
    </div>

    <main class="max-w-[1600px] mx-auto p-4 md:p-8">
        <section id="view-directory" class="space-y-6">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <i data-lucide="search" class="absolute right-4 top-3.5 text-slate-400 w-5 h-5"></i>
                    <input type="text" id="searchInput" oninput="renderTable()" placeholder="חיפוש לפי שם עסק או בעלים..." class="w-full pr-12 pl-4 py-3 rounded-xl bg-slate-50 border-transparent focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-right">
                </div>
                <select id="neighborhoodFilter" onchange="renderTable()" class="px-6 py-3 rounded-xl bg-slate-50 border-transparent font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-right">
                    <option value="הכל">כל השכונות</option>
                </select>
            </div>

            <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto custom-scrollbar">
                    <table class="w-full text-right border-collapse min-w-[1600px]">
                        <thead>
                            <tr id="table-headers" class="bg-slate-50 text-slate-500 font-bold text-xs uppercase border-b border-slate-200">
                                <th class="px-6 py-4 sticky-col text-right">עסק</th>
                                <th class="px-6 py-4 text-right">בעלים/איש קשר</th>
                                <th class="px-6 py-4 text-right">מיקום</th>
                                <th class="px-6 py-4 text-center">סוג מבנה</th>
                                <th id="dynamic-headers-area" class="contents"></th>
                                <th class="px-6 py-4 text-center">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="business-tbody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-settings" class="hidden max-w-6xl mx-auto space-y-8 animate-in slide-in-from-bottom duration-300">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                    <h2 class="text-lg font-black text-slate-900 mb-4 flex items-center gap-2 justify-end"><i data-lucide="map-pinned" class="text-blue-600"></i> ניהול שכונות</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newNeighborhoodName" placeholder="שם שכונה..." class="flex-grow p-2 bg-slate-50 border rounded-xl outline-none text-sm text-right">
                        <button onclick="addToList('neighborhoods', 'newNeighborhoodName')" class="bg-blue-600 text-white px-3 py-1 rounded-xl font-bold text-xs">הוספה</button>
                    </div>
                    <div id="list-neighborhoods" class="space-y-1"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                    <h2 class="text-lg font-black text-slate-900 mb-4 flex items-center gap-2 justify-end"><i data-lucide="star" class="text-yellow-500"></i> פרמטרים מותאמים</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newFieldName" placeholder="שם שדה חדש..." class="flex-grow p-2 bg-slate-50 border rounded-xl outline-none text-sm text-right">
                        <button onclick="addDynamicField()" class="bg-blue-900 text-white px-3 py-1 rounded-xl font-bold text-xs">הוספה</button>
                    </div>
                    <div id="dynamic-fields-list" class="space-y-1"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="editModal" class="modal px-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-6xl max-h-[92vh] overflow-hidden flex flex-col">
        <div class="p-8 bg-blue-900 text-white flex justify-between items-center text-right">
            <h2 id="modalTitle" class="text-2xl font-black">עריכת כרטיס עסק</h2>
            <button onclick="closeModal()" class="bg-white/10 p-2 rounded-full"><i data-lucide="x" class="w-8 h-8"></i></button>
        </div>
        <div id="editFormBody" class="p-8 overflow-y-auto bg-slate-50/50 text-right"></div>
        <div class="p-8 border-t bg-white flex gap-4 justify-end">
            <button onclick="closeModal()" class="px-10 py-3 font-bold text-slate-500">ביטול</button>
            <button onclick="saveBusiness()" class="bg-blue-600 text-white px-16 py-4 rounded-2xl font-black shadow-xl">שמירה</button>
        </div>
    </div>
</div>

<script>
    let config = { neighborhoods: ["סוקולוב", "אוסישקין", "מורשה", "הדר", "אלון", "גולן", "נווה גן"], buildingTypes: ["חנות רחוב", "מרכז מסחרי", "משתלה", "אחר"] };
    let businesses = [{ id: 1, name: "קפה בוטיק השרון", owner: "דנה כהן", phone: "052-1234567", address: "סוקולוב 45", neighborhood: "סוקולוב", buildingType: "חנות רחוב", customValues: { priority: "גבוהה" } }];
    let dynamicFields = [{ id: 'priority', label: 'חשיבות עירונית' }];
    let currentEditingId = null;

    function toggleTab(tab) {
        ['directory', 'settings'].forEach(v => {
            document.getElementById(`view-\${v}`).classList.add('hidden');
            document.getElementById(`tab-\${v}`).className = "py-4 font-bold flex items-center gap-2 text-slate-400";
        });
        document.getElementById(`view-\${tab}`).classList.remove('hidden');
        document.getElementById(`tab-\${tab}`).className = "py-4 font-bold flex items-center gap-2 tab-active transition-all";
        if(tab === 'directory') renderTable();
        if(tab === 'settings') renderSettings();
        lucide.createIcons();
    }

    function renderTable() {
        const tbody = document.getElementById('business-tbody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const neighborhood = document.getElementById('neighborhoodFilter').value;
        const filterSelect = document.getElementById('neighborhoodFilter');
        filterSelect.innerHTML = '<option value="הכל">כל השכונות</option>' + config.neighborhoods.map(n => \`<option value="\${n}">\${n}</option>\`).join('');
        
        const dynamicHeaders = document.getElementById('dynamic-headers-area');
        dynamicHeaders.innerHTML = dynamicFields.map(f => \`<th class="px-6 py-4 bg-blue-50/50 text-blue-900 text-center">\${f.label}</th>\`).join('');

        tbody.innerHTML = businesses.filter(b => b.name.toLowerCase().includes(searchTerm)).map(b => \`
            <tr>
                <td class="px-6 py-5 sticky-col text-right font-black">\${b.name}</td>
                <td class="px-6 py-5 text-right font-bold text-slate-700">\${b.owner}</td>
                <td class="px-6 py-5 text-right text-xs">\${b.address}</td>
                <td class="px-6 py-5 text-center text-xs font-bold">\${b.buildingType}</td>
                \${dynamicFields.map(f => \`<td class="px-6 py-5 text-center font-bold text-blue-600">\${b.customValues[f.id] || "-"}</td>\`).join('')}
                <td class="px-6 py-5 text-center"><button onclick="openEdit(\${b.id})" class="p-2 bg-blue-50 text-blue-600 rounded-xl"><i data-lucide="edit-2" class="w-4 h-4"></i></button></td>
            </tr>
        \`).join('');
        lucide.createIcons();
    }

    function openEdit(id) {
        currentEditingId = id;
        const b = businesses.find(x => x.id === id) || { id: Date.now(), name: "", owner: "", address: "", neighborhood: config.neighborhoods[0], customValues: {} };
        const formHtml = \`
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="input-group"><label>שם העסק</label><input id="edit-name" value="\${b.name}"></div>
                    <div class="input-group"><label>בעלים</label><input id="edit-owner" value="\${b.owner || ''}"></div>
                </div>
                <div class="space-y-4">
                    <div class="input-group"><label>כתובת</label><input id="edit-address" value="\${b.address || ''}"></div>
                    <div class="input-group"><label>שכונה</label><select id="edit-neighborhood">\${config.neighborhoods.map(n=>\`<option \${b.neighborhood===n?'selected':''}>\${n}</option>\`).join('')}</select></div>
                </div>
                <div class="col-span-2 bg-blue-50/50 p-6 rounded-3xl space-y-4">
                    <h3 class="text-blue-900 font-black text-xs border-b border-blue-200 pb-3">פרמטרים מותאמים</h3>
                    \${dynamicFields.map(f => \`<div class="input-group"><label>\${f.label}</label><input id="dynamic-\${f.id}" value="\${b.customValues[f.id] || ''}"></div>\`).join('')}
                </div>
            </div>
        \`;
        document.getElementById('editFormBody').innerHTML = formHtml;
        document.getElementById('editModal').classList.add('active');
        lucide.createIcons();
    }

    function saveBusiness() {
        let b = businesses.find(x => x.id === currentEditingId);
        if(!b) { b = { id: currentEditingId, customValues: {} }; businesses.push(b); }
        b.name = document.getElementById('edit-name').value;
        b.owner = document.getElementById('edit-owner').value;
        b.address = document.getElementById('edit-address').value;
        b.neighborhood = document.getElementById('edit-neighborhood').value;
        dynamicFields.forEach(f => { b.customValues[f.id] = document.getElementById(\`dynamic-\${f.id}\`).value; });
        closeModal(); renderTable();
    }

    function renderSettings() {
        document.getElementById('list-neighborhoods').innerHTML = config.neighborhoods.map((n, idx) => \`
            <div class="flex justify-between items-center p-2 bg-slate-50 rounded-lg border text-xs font-bold">
                <span>\${n}</span>
                <button onclick="removeFromList('neighborhoods', \${idx})" class="text-red-400"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
        \`).join('');
        document.getElementById('dynamic-fields-list').innerHTML = dynamicFields.map(f => \`
            <div class="flex justify-between items-center p-2 bg-slate-50 rounded-lg border text-xs font-bold">
                <span>\${f.label}</span>
                <button onclick="removeDynamicField('\${f.id}')" class="text-red-400"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
        \`).join('');
        lucide.createIcons();
    }

    function addToList(key, inputId) { const val = document.getElementById(inputId).value; if(val) config[key].push(val); document.getElementById(inputId).value=''; renderSettings(); }
    function removeFromList(key, idx) { config[key].splice(idx, 1); renderSettings(); }
    function addDynamicField() { const val = document.getElementById('newFieldName').value; if(val) dynamicFields.push({ id: val.toLowerCase(), label: val }); document.getElementById('newFieldName').value=''; renderSettings(); }
    function removeDynamicField(id) { dynamicFields = dynamicFields.filter(f => f.id !== id); renderSettings(); }
    function closeModal() { document.getElementById('editModal').classList.remove('active'); }
    function openNewBusiness() { openEdit(Date.now()); }
    function copyFullCode() { const h = document.documentElement.outerHTML; navigator.clipboard.writeText(h); alert("הקוד הועתק!"); }
    function exportToCSV() { let csv = "\\uFEFFשם,בעלים,כתובת\\n"; businesses.forEach(b => csv += \`"\${b.name}","\${b.owner}","\${b.address}"\\n\`); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.setAttribute("download", "Export.csv"); link.click(); }

    window.onload = () => { renderTable(); lucide.createIcons(); };
</script>
</body>
</html>
